name: TinyYAML
options:
  bundleIdPrefix: com.tinyyaml
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"

targets:
  TinyYAML:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyYAML
        excludes:
          - "Resources"
      - path: Sources/TinyYAML/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyYAML/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TinyYAML/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: YAML Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.yaml
            CFBundleTypeExtensions:
              - yml
              - yaml
          - CFBundleTypeName: TOML Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - toml
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: public.yaml
            UTTypeDescription: YAML Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - yml
                - yaml
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyyaml.app
        PRODUCT_NAME: "TinyYAML"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyYAML.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit
      - package: Yams
        product: Yams

schemes:
  TinyYAML:
    build:
      targets:
        TinyYAML: all
